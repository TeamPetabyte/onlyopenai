<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PipekAI — Change Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap"
        rel="stylesheet" />
    <style>
        /* Pastel theme — matches login.html (Petabyte logo palette) */
        :root {
            --logo-light: #4691da;
            --logo-mid:   #2e6cb0;
            --logo-navy:  #143a66;
            --ink:        #1e3a5f;
            --ink-2:      #4a5f7a;
            --ink-3:      #8499b4;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background:
                radial-gradient(1100px 600px at 50% -10%, #ffffff 0%, rgba(255, 255, 255, 0) 60%),
                linear-gradient(160deg, #eaf3fe 0%, #dcebfb 46%, #f4f9ff 100%);
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(70, 145, 218, 0.055) 1px, transparent 1px),
                linear-gradient(90deg, rgba(70, 145, 218, 0.055) 1px, transparent 1px);
            background-size: 48px 48px;
            mask-image: radial-gradient(circle at 50% 40%, #000 0%, transparent 75%);
            -webkit-mask-image: radial-gradient(circle at 50% 40%, #000 0%, transparent 75%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            top: -220px;
            left: 50%;
            transform: translateX(-50%);
            width: 640px;
            height: 640px;
            background: radial-gradient(circle, rgba(70, 145, 218, 0.18) 0%, transparent 70%);
            pointer-events: none;
        }

        .wrap {
            width: 100%;
            max-width: 460px;
            padding: 24px;
            position: relative;
            z-index: 1;
        }

        .brand {
            text-align: center;
            margin-bottom: 28px;
        }

        .brand-logo {
            width: 152px;
            max-width: 56%;
            margin: 0 auto 16px;
            background: #ffffff;
            border: 1px solid rgba(70, 145, 218, 0.14);
            border-radius: 22px;
            padding: 14px 18px;
            box-shadow:
                0 14px 34px rgba(46, 108, 176, 0.18),
                0 2px 6px rgba(46, 108, 176, 0.08);
        }

        .brand-logo img {
            width: 100%;
            height: auto;
            display: block;
        }

        .brand-name {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, var(--logo-light), var(--logo-mid));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand-sub {
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--ink-3);
            margin-top: 6px;
        }

        .card {
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow:
                0 20px 56px rgba(46, 108, 176, 0.16),
                0 2px 0 rgba(255, 255, 255, 0.7) inset;
            border-radius: 22px;
            padding: 30px;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
        }

        .card-title {
            font-size: 1.12rem;
            font-weight: 700;
            color: var(--ink);
            margin-bottom: 6px;
        }

        .card-desc {
            font-size: 0.82rem;
            color: var(--ink-2);
            margin-bottom: 22px;
            line-height: 1.5;
        }

        .info-banner {
            background: rgba(240, 160, 64, 0.10);
            border: 1px solid rgba(240, 160, 64, 0.30);
            color: #b6741a;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 0.78rem;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--ink-2);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            background: #ffffff;
            border: 1px solid rgba(70, 145, 218, 0.22);
            border-radius: 11px;
            color: var(--ink);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            padding: 12px 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--logo-light);
            box-shadow: 0 0 0 4px rgba(70, 145, 218, 0.15);
        }

        .form-input::placeholder { color: #aebfd6; }

        .pw-rules {
            font-size: 0.72rem;
            color: var(--ink-3);
            font-family: 'JetBrains Mono', monospace;
            line-height: 1.7;
            margin: 6px 0 18px;
            padding-left: 4px;
        }

        .pw-rule { display: flex; align-items: center; gap: 6px; }
        .pw-rule.met  { color: #1f9d57; }
        .pw-rule.miss { color: var(--ink-3); }

        .btn-primary {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--logo-light) 0%, var(--logo-mid) 100%);
            color: #ffffff;
            border: none;
            border-radius: 11px;
            font-size: 0.95rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s, filter 0.2s;
            letter-spacing: 0.01em;
            box-shadow: 0 10px 22px rgba(46, 108, 176, 0.28);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 28px rgba(46, 108, 176, 0.36);
            filter: saturate(1.05);
        }
        .btn-primary:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-link {
            display: block;
            text-align: center;
            margin-top: 14px;
            color: var(--ink-3);
            font-size: 0.78rem;
            text-decoration: none;
            cursor: pointer;
            background: none;
            border: none;
            font-family: 'Inter', sans-serif;
            width: 100%;
        }
        .btn-link:hover { color: var(--logo-mid); }

        .error-msg {
            background: rgba(220, 53, 69, 0.08);
            border: 1px solid rgba(220, 53, 69, 0.28);
            color: #c0392b;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 0.82rem;
            margin-bottom: 16px;
            display: none;
        }
        .error-msg.show { display: block; }
    </style>
</head>

<body>
    <div class="wrap">
        <!-- Brand: full Petabyte logo on a white badge (same as login). -->
        <div class="brand">
            <div class="brand-logo">
                <img src="/assets/logo-ptb.png" alt="Petabyte" />
            </div>
            <div class="brand-name">PipekAI</div>
            <div class="brand-sub" id="who">เปลี่ยนรหัสผ่านครั้งแรก</div>
        </div>

        <div class="card">
            <div class="card-title">ตั้งรหัสผ่านใหม่</div>
            <div class="card-desc">
                เพื่อความปลอดภัย กรุณาเปลี่ยนรหัสผ่านชั่วคราวเป็นรหัสของคุณเองก่อนเริ่มใช้งาน
            </div>

            <div class="info-banner">
                ⓘ รหัสผ่านนี้ตั้งโดย admin — เปลี่ยนแล้วจะใช้รหัสเดิมเข้าสู่ระบบไม่ได้อีก
            </div>

            <div class="error-msg" id="error-msg"></div>

            <form id="pw-form" onsubmit="handleChange(event)">
                <div class="form-group">
                    <label class="form-label" for="new-pw">รหัสผ่านใหม่</label>
                    <input class="form-input" id="new-pw" type="password" autocomplete="new-password"
                        placeholder="อย่างน้อย 8 ตัว มีตัวอักษร+ตัวเลข" required oninput="updateRules()" />
                </div>
                <div class="form-group">
                    <label class="form-label" for="new-pw2">ยืนยันรหัสผ่านใหม่</label>
                    <input class="form-input" id="new-pw2" type="password" autocomplete="new-password"
                        placeholder="พิมพ์อีกครั้ง" required oninput="updateRules()" />
                </div>

                <div class="pw-rules" id="pw-rules">
                    <div class="pw-rule miss" id="r-len">○ ยาวอย่างน้อย 8 ตัว</div>
                    <div class="pw-rule miss" id="r-letter">○ มีตัวอักษร (A-Z, a-z)</div>
                    <div class="pw-rule miss" id="r-digit">○ มีตัวเลข (0-9)</div>
                    <div class="pw-rule miss" id="r-match">○ รหัสทั้งสองช่องตรงกัน</div>
                </div>

                <button class="btn-primary" type="submit" id="submit-btn" disabled>เปลี่ยนรหัสผ่าน</button>
                <button class="btn-link" type="button" onclick="signOut()">ออกจากระบบ</button>
            </form>
        </div>
    </div>

    <script src="js/config.js?v=phase9-1"></script>
    <script src="js/auth.js?v=phase24"></script>
    <script>
        // Guard: must be logged in to be here
        (function () {
            const session = Auth.getSession();
            if (!session) { window.location.href = 'login.html'; return; }
            // Show username
            document.getElementById('who').textContent = '@' + session.username;
        })();

        function updateRules() {
            const pw = document.getElementById('new-pw').value;
            const pw2 = document.getElementById('new-pw2').value;
            const rules = {
                len:    pw.length >= 8 && pw.length <= 128,
                letter: /[A-Za-z]/.test(pw),
                digit:  /[0-9]/.test(pw),
                match:  pw && pw === pw2,
            };
            for (const k in rules) {
                const el = document.getElementById('r-' + k);
                el.className = 'pw-rule ' + (rules[k] ? 'met' : 'miss');
                el.textContent = (rules[k] ? '● ' : '○ ') + el.textContent.replace(/^[●○]\s*/, '');
            }
            const allOk = rules.len && rules.letter && rules.digit && rules.match;
            document.getElementById('submit-btn').disabled = !allOk;
        }

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.classList.add('show');
        }
        function hideError() {
            document.getElementById('error-msg').classList.remove('show');
        }

        async function handleChange(e) {
            e.preventDefault();
            hideError();
            const pw  = document.getElementById('new-pw').value;
            const pw2 = document.getElementById('new-pw2').value;
            if (pw !== pw2) { showError('รหัสทั้งสองช่องไม่ตรงกัน'); return; }

            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.textContent = 'กำลังบันทึก...';

            const result = await Auth.changePassword(pw);
            if (!result.ok) {
                showError(result.error || 'เปลี่ยนรหัสผ่านไม่สำเร็จ');
                btn.disabled = false;
                btn.textContent = 'เปลี่ยนรหัสผ่าน';
                return;
            }
            // Done — redirect by role
            const session = Auth.getSession();
            window.location.href = (session && session.role === 'admin') ? 'admin.html' : 'index.html';
        }

        function signOut() {
            Auth.logout();    // also clears token + redirects to login.html
        }
    </script>
</body>

</html>
